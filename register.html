<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Pelayanan Publik Kelurahan Cibubur</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="image/Pemprov DKI Jakarta.webp" alt="Logo DKI">
                <h2>Kelurahan Cibubur</h2>
            </div>
            <div class="auth-header">
                <h3>Buat Akun Baru</h3>
                <p>Daftarkan diri Anda untuk mengakses berbagai layanan publik.</p>
            </div>
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="name">Nama Lengkap (Sesuai KTP)</label>
                    <div class="input-icon">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="name" placeholder="Masukkan Nama Lengkap" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="nik">NIK (Nomor Induk Kependudukan)</label>
                    <div class="input-icon">
                        <i class="fas fa-fingerprint"></i>
                        <input type="text" id="nik" placeholder="Masukkan 16 Digit NIK" required pattern="\d{16}" title="NIK harus 16 digit angka">
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Masukkan Email Aktif" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Kata Sandi</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Buat Kata Sandi" required minlength="6">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary auth-btn">Daftar Akun</button>
            </form>
            <div class="auth-footer">
                <p>Sudah punya akun? <a href="login.html">Masuk di sini</a></p>
                <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Kembali ke Beranda</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.querySelector('.auth-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';
            btn.disabled = true;
            
            setTimeout(() => {
                alert('Pendaftaran berhasil! Silakan masuk dengan akun baru Anda.');
                window.location.href = 'login.html';
            }, 1500);
        });
    </script>
</body>
</html>
