<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Pelayanan Publik Kelurahan Cibubur</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="icon" type="image/webp" href="image/Pemprov DKI Jakarta.webp">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="image/Pemprov DKI Jakarta.webp" alt="Logo DKI">
                <h2>Kelurahan Cibubur</h2>
            </div>
            <div class="auth-header">
                <h3>Selamat Datang Kembali!</h3>
                <p>Silakan masuk ke akun Anda untuk melanjutkan layanan.</p>
            </div>
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email / NIK</label>
                    <div class="input-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="email" placeholder="Masukkan Email atau NIK Anda" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Kata Sandi</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Masukkan Kata Sandi" required>
                    </div>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Ingat Saya
                    </label>
                    <a href="#" class="forgot-password">Lupa Kata Sandi?</a>
                </div>
                <button type="submit" class="btn btn-primary auth-btn">Masuk</button>
            </form>
            <div class="auth-footer">
                <p>Belum punya akun? <a href="register.html">Daftar sekarang</a></p>
                <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Kembali ke Beranda</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.querySelector('.auth-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';
            btn.disabled = true;
            
            setTimeout(() => {
                window.location.href = 'index.html?status=loggedin';
            }, 1500);
        });
    </script>
</body>
</html>
